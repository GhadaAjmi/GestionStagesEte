version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestionstagesete
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  backend:
    build: ./projet
    container_name: spring-backend
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      - mysql-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - app-network

  frontend:
    build: ./front_spring
    container_name: angular-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
