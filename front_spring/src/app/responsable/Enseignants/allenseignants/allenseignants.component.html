<!--! ================================================================ !-->
<!--! [Start] Main Content !-->
<!--! ================================================================ !-->
<main class="nxl-container apps-container apps-storage">
    <div class="nxl-content without-header nxl-full-content">
      
        <!-- [ Main Content ] start -->
        <div class="main-content d-flex">
            <!-- [ Main Area  ] start -->
            <div class="content-area" data-scrollbar-target="#psScrollbarInit">
              
     <div class="content-area-header sticky-top">
    
      <div class="page-header-left d-flex align-items-center gap-2">
        <div class="page-header-title">
          <h5 class="m-b-10">Enseignants</h5>
        </div>
        <!-- Sidebar toggle -->
        <a href="javascript:void(0);" class="app-sidebar-open-trigger me-2">
            <i class="feather-align-left fs-20"></i>
        </a>

    </div>

    <div class="page-header-right ms-auto">
        <div class="hstack gap-2">

            <!-- Recherche -->
            <div class="hstack">
                <a href="javascript:void(0)"
                   class="search-form-open-toggle"
                   (click)="toggleSearch()">
                    <div class="avatar-text avatar-md"
                         data-bs-toggle="tooltip"
                         data-bs-trigger="hover"
                         title="Rechercher">
                        <i class="feather-search"></i>
                    </div>
                </a>
                <form class="search-form" [style.display]="isSearchOpen ? 'block' : 'none'">
                    <div class="search-form-inner">
                        <a href="javascript:void(0)"
                           class="search-form-close-toggle"
                           (click)="toggleSearch()">
                            <div class="avatar-text avatar-md"
                                 data-bs-toggle="tooltip"
                                 data-bs-trigger="hover"
                                 title="Fermer">
                                <i class="feather-arrow-left"></i>
                            </div>
                        </a>
                        <input type="search"
                               class="py-3 px-0 border-0 w-100"
                               id="storageSearch"
                               placeholder="Rechercher un enseignant..."
                               autocomplete="off"
                               [value]="searchTerm"
                               (input)="onSearch($any($event.target).value)">
                    </div>
                </form>
            </div>

          

            <!-- Grid View -->
            <a href="javascript:void(0)"
               class="d-flex d-none d-sm-block"
               (click)="setGridView()">
                <div class="avatar-text avatar-md"
                     data-bs-toggle="tooltip"
                     data-bs-trigger="hover"
                     title="Vue grille"
                     [style.background]="isGridView ? 'var(--bs-primary-bg-subtle)' : ''">
                    <i class="feather-grid"
                       [style.color]="isGridView ? 'var(--bs-primary)' : ''"></i>
                </div>
            </a>

            <!-- List View -->
            <a href="javascript:void(0)"
               class="d-flex d-none d-sm-block"
               (click)="setListView()">
                <div class="avatar-text avatar-md"
                     data-bs-toggle="tooltip"
                     data-bs-trigger="hover"
                     title="Vue liste"
                     [style.background]="!isGridView ? 'var(--bs-primary-bg-subtle)' : ''">
                    <i class="feather-list"
                       [style.color]="!isGridView ? 'var(--bs-primary)' : ''"></i>
                </div>
            </a>

           

        </div>
    </div>
</div>
        <div class="content-area-body">

          <!-- Message vide -->
          <div *ngIf="enseignantsFiltres.length === 0" class="text-center py-5">
            <i class="feather-users fs-40 text-muted d-block mb-2"></i>
            <span class="text-muted fs-14">Aucun enseignant trouvé</span>
          </div>

          <!-- LIST VIEW -->
          <div class="card mb-0" *ngIf="!isGridView && enseignantsFiltres.length > 0">
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <tr>
                    <th scope="col"></th>

                      <th scope="col">Nom</th>
                      <th scope="col">Prénom</th>
                      <th scope="col">Grade</th>
                      <th scope="col">Domaine</th>
                      <th scope="col">Département</th>
                      <th scope="col">Email</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let e of enseignantsFiltres">
<td>
  <img class="avatar-image"
    [src]="getPhoto(e.id)" 
    alt="photo">
</td>

                      <td>{{ e.nom }}</td>
                      <td>{{ e.prenom }}</td>
                      <td>{{ e.grade }}</td>
                      <td>{{ e.domaine }}</td>
                      <td>{{ e.departement || '-' }}</td>
                      <td>{{ e.email }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- GRID VIEW -->
          <div *ngIf="isGridView && enseignantsFiltres.length > 0">
            <div class="row">
              <div class="col-xxl-3 col-sm-6" *ngFor="let e of enseignantsFiltres">
                <div class="card mb-4 stretch stretch-full">
                  <div class="card-body p-0">

                    <!-- Header : photo + nom -->
                    <div class="d-flex align-items-center border-bottom p-3 gap-3">
                      <div class=" avatar-image ">
                        <img [src]="getPhoto(e.id)"
                             alt="Photo" class="img-fluid" style="width:40px;height:40px;">
                      </div>
                      <div>
                        <span class="d-block fs-13 fw-500">{{ e.prenom }} {{ e.nom }}</span>
                        <span class="fs-11 text-muted">{{ e.grade }}</span>
                      </div>
                    </div>

                    <!-- Domaine, Département & Email -->
                    <div class="p-3">
                      <p class="fs-12 text-muted mb-1">
                        <i class="feather-book me-1" style="font-size:11px"></i>
                        {{ e.domaine }}
                      </p>
                      <p class="fs-12 text-muted mb-1">
                        <i class="feather-layers me-1" style="font-size:11px"></i>
                        {{ e.departement || '-' }}
                      </p>
                      <p class="fs-12 text-muted mb-0">
                        <i class="feather-mail me-1" style="font-size:11px"></i>
                        {{ e.email }}
                      </p>
                    </div>

                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
</main>
<!--! END Main Content Enseignants !-->
