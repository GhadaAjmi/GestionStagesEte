<main class="nxl-container">
  <div class="nxl-content">
    <div class="main-content">
      <div class="tab-content">
        <div class="tab-pane fade show active" id="profileTab" role="tabpanel">
          <div class="card card-body general-info">

            <div class="mb-4 d-flex align-items-center justify-content-between">
              <div>
                <h5 class="fw-bold mb-0">
                  <span class="d-block mb-2">Modifier mon profil</span>
                  <span class="fs-12 fw-normal text-muted d-block">
                    Mettez à jour votre photo et vos informations complémentaires.
                  </span>
                </h5>
              </div>
            </div>

            <form [formGroup]="profileForm" (ngSubmit)="save()" *ngIf="currentUser; else loadingTpl">

              <div class="row mb-4">

                <!-- Photo -->
                <div class="col-lg-3 d-flex flex-column align-items-center">
                  <label class="form-label fw-semibold mb-2">Photo de profil</label>
                  <img [src]="photoUrl"
                       alt="Photo de profil"
                       class="rounded-circle border mb-3"
                       style="width: 120px; height: 120px; object-fit: cover;">
                  <input type="file" id="photo" (change)="onPhotoChange($event)" accept="image/*" hidden>
                  <label for="photo" class="btn btn-outline-secondary btn-sm">
                    Choisir une photo
                  </label>
                </div>

                <!-- Infos lecture seule -->
                <div class="col-lg-9">
                  <p class="text-muted fs-12 mb-3">
                    Ces informations sont gérées par l'administration et ne peuvent pas être modifiées.
                  </p>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Prénom</label>
                      <input type="text" class="form-control bg-light" formControlName="prenom" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Nom</label>
                      <input type="text" class="form-control bg-light" formControlName="nom" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control bg-light" formControlName="email" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">CIN</label>
                      <input type="text" class="form-control bg-light" formControlName="cin" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Téléphone</label>
                      <input type="text" class="form-control bg-light" formControlName="telephone" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Rôle</label>
                      <input type="text" class="form-control bg-light" formControlName="role" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Lieu de délivrance CIN</label>
                      <input type="text" class="form-control bg-light" formControlName="lieuDelivranceCin" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Date de délivrance CIN</label>
                      <input type="text" class="form-control bg-light" formControlName="dateDelivranceCin" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Statut</label>
                      <input type="text"
                             class="form-control bg-light"
                             [value]="currentUser.actif ? 'Actif' : 'Inactif'"
                             readonly>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Champs éditables ETUDIANT -->
              <div *ngIf="hasStudentFields()">
                <hr>
                <h6 class="fw-semibold mb-3">Informations académiques</h6>
                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label class="form-label">Niveau</label>
                    <input type="text" class="form-control" formControlName="niveau">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Spécialité</label>
                    <input type="text" class="form-control" formControlName="specialite">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Département</label>
                    <input type="text" class="form-control" formControlName="departement">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Groupe</label>
                    <input type="text" class="form-control" formControlName="groupe">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Numéro d'inscription</label>
                    <input type="text" class="form-control bg-light" formControlName="numeroInscription" readonly>
                  </div>
                </div>
              </div>

              <!-- Champs éditables ENSEIGNANT / CHEF_DEPARTEMENT -->
              <div *ngIf="hasTeacherFields()">
                <hr>
                <h6 class="fw-semibold mb-3">Informations professionnelles</h6>
                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label class="form-label">Grade</label>
                    <input type="text" class="form-control" formControlName="grade">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Domaine</label>
                    <input type="text" class="form-control" formControlName="domaine">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Département</label>
                    <input type="text" class="form-control" formControlName="departement">
                  </div>
                </div>
              </div>

              <hr>
              <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
              </div>

              <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
              <div *ngIf="savedMessage" class="alert alert-success mt-3">{{ savedMessage }}</div>

            </form>

            <ng-template #loadingTpl>
              <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 mb-0">Chargement du profil...</p>
              </div>
            </ng-template>

          </div>
        </div>
      </div>
    </div>
  </div>
</main>
