<!--! [Start] Main Content !-->
<!--! ================================================================ !-->
<main class="nxl-container">
  <div class="nxl-content">
    <div class="main-content">
      <div class="tab-content">
        <div class="tab-pane fade show active" id="passwordTab" role="tabpanel">
          <div class="card card-body general-info">
            <div class="mb-4 d-flex align-items-center justify-content-between">
              <div>
                <h5 class="fw-bold mb-0">Changer le mot de passe</h5>
                <span class="fs-12 fw-normal text-muted d-block">
                  Modifiez votre mot de passe en toute sécurité.
                </span>
              </div>
            </div>

            <form [formGroup]="passwordForm" (ngSubmit)="save()">
              <div class="mb-3">
                <label class="form-label">Ancien mot de passe</label>
                <input type="password" class="form-control" formControlName="ancienMotDePasse">
              </div>

              <div class="mb-3">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-control" formControlName="nouveauMotDePasse">
              </div>

              <div class="mb-3">
                <label class="form-label">Confirmer le nouveau mot de passe</label>
                <input type="password" class="form-control" formControlName="confirmationMotDePasse">
              </div>

              <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" role="status"></span>
                  Enregistrer
                </button>
              </div>

              <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
              <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<!--! ================================================================ !-->
<!--! [End] Main Content !-->
