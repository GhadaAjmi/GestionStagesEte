<header class="nxl-header">
  <div class="header-wrapper d-flex align-items-center justify-content-between">

    <!-- Logo -->
    <div class="header-left d-flex align-items-center">
      <a routerLink="/dashboard" class="b-brand">
      </a>
    </div>

    <!-- Header Right -->
    <div class="header-right">
      <div class="d-flex align-items-center gap-3">

      
        <!-- User -->
        <div class="dropdown nxl-h-item">
          <a data-bs-toggle="dropdown">
            <img
              [src]="imageUrl || 'assets/images/avatar/default.png'"
              class="img-fluid user-avtar"
              alt="user"
            />
          </a>

          <div class="dropdown-menu dropdown-menu-end nxl-h-dropdown">

            <div class="dropdown-header">
              <strong>{{ currentUser?.prenom }} {{ currentUser?.nom }}</strong>
              <div class="text-muted fs-12">{{ currentUser?.email }}</div>
            </div>


            <a routerLink="/profile" class="dropdown-item">
              <i class="feather-user"></i> Mon profil
            </a>

            

            <div class="dropdown-divider"></div>

            <a (click)="logout()" class="dropdown-item text-danger">
              <i class="feather-log-out"></i> Déconnexion
            </a>

          </div>
        </div>

      </div>
    </div>

  </div>
</header>
